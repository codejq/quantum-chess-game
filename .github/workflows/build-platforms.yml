name: Build Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  web:
    name: Web Offline Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build offline web app
        run: npm run test:offline-build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Chess-web
          path: dist/web

      - name: Package web release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          zip -r "Quantum-Chess-${{ github.ref_name }}-web.zip" web

      - name: Attach web build to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/Quantum-Chess-${{ github.ref_name }}-web.zip

  desktop:
    name: Desktop ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run tauri:build

      - name: Collect desktop release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          mkdir -p "release/${{ matrix.platform }}"
          if [ -d src-tauri/target/release/bundle ]; then
            find src-tauri/target/release/bundle -type f \
              \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
              -exec cp {} "release/${{ matrix.platform }}/" \;
          fi
          if [ "${{ matrix.platform }}" = "windows" ] && [ -f src-tauri/target/release/quantum-chess.exe ]; then
            cp src-tauri/target/release/quantum-chess.exe "release/${{ matrix.platform }}/Quantum-Chess-${{ github.ref_name }}-windows.exe"
          fi
          if [ "${{ matrix.platform }}" != "windows" ] && [ -f src-tauri/target/release/quantum-chess ]; then
            cp src-tauri/target/release/quantum-chess "release/${{ matrix.platform }}/Quantum-Chess-${{ github.ref_name }}-${{ matrix.platform }}"
          fi
          ls -la "release/${{ matrix.platform }}"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Chess-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/quantum-chess*

      - name: Attach desktop build to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/${{ matrix.platform }}/*

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install dependencies
        run: npm ci

      - name: Initialize iOS project if needed
        run: |
          if [ ! -d src-tauri/gen/apple ]; then
            npm exec -- tauri ios init
          fi

      - name: Build iOS app
        id: ios_build
        continue-on-error: true
        run: npm run tauri:ios:build

      - name: Collect iOS release assets
        run: |
          mkdir -p release/ios
          find src-tauri/gen -type f \( -name "*.ipa" -o -name "*.xcarchive" \) -exec cp {} release/ios/ \; || true
          find src-tauri/gen -maxdepth 8 -type d -name "*.app" -print0 | while IFS= read -r -d '' app; do
            name="$(basename "$app" .app)"
            ditto -c -k --keepParent "$app" "release/ios/${name}-${{ github.ref_name }}.app.zip"
          done
          if [ "$(find release/ios -type f | wc -l)" -eq 0 ] && [ -d src-tauri/gen/apple ]; then
            echo "No signed iOS binary was produced. Packaging generated iOS project instead."
            ditto -c -k --keepParent src-tauri/gen/apple "release/ios/Quantum-Chess-${{ github.ref_name }}-ios-project.zip"
          fi
          ls -la release/ios
          test "$(find release/ios -type f | wc -l)" -gt 0

      - name: Warn when iOS binary build is unavailable
        if: steps.ios_build.outcome == 'failure'
        run: |
          echo "::warning::Tauri iOS binary build failed, likely because Apple signing/provisioning is not configured. Uploaded the generated iOS project archive instead."

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Chess-ios
          path: release/ios/**

      - name: Attach iOS build to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/ios/*

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: npm ci

      - name: Prepare Android signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.KEY_PASSWORD }}
        run: |
          KS_PATH="$GITHUB_WORKSPACE/Quantum-Chess-release.jks"
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            printf '%s' "$KEYSTORE_BASE64" | tr -d ' \r\n' | base64 --decode > /tmp/Quantum-Chess-orig.keystore
            keytool -importkeystore \
              -srckeystore /tmp/Quantum-Chess-orig.keystore \
              -srcstorepass "$KEYSTORE_PASSWORD" \
              -destkeystore "$KS_PATH" \
              -deststoretype JKS \
              -deststorepass "$KEYSTORE_PASSWORD" \
              -noprompt
          elif [ -z "$KEYSTORE_BASE64" ] && [ -z "$KEYSTORE_PASSWORD" ] && [ -z "$KEY_ALIAS" ] && [ -z "$KEY_PASSWORD" ]; then
            echo "Android signing secrets are missing. Generating a temporary CI release key for this release only."
            KEYSTORE_PASSWORD="temporary-quantum-chess-release"
            KEY_ALIAS="quantum-chess"
            KEY_PASSWORD="$KEYSTORE_PASSWORD"
            keytool -genkeypair \
              -keystore "$KS_PATH" \
              -storetype JKS \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Quantum Chess Temporary Release" \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD"
          else
            echo "Android signing secrets are partially configured. Provide all four signing values or none to use the temporary fallback."
            exit 1
          fi
          {
            echo "ANDROID_KEYSTORE_PATH=$KS_PATH"
            echo "ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Initialize Android project if needed
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            npm run tauri -- android init
          fi

      - name: Configure Android release signing
        run: |
          cd src-tauri/gen/android
          {
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "password=$ANDROID_KEY_PASSWORD"
            echo "storeFile=$ANDROID_KEYSTORE_PATH"
          } > keystore.properties
          APP_GRADLE="app/build.gradle.kts"
          grep -q "import java.io.FileInputStream" "$APP_GRADLE" || sed -i '1i import java.io.FileInputStream' "$APP_GRADLE"
          grep -q "import java.util.Properties" "$APP_GRADLE" || sed -i '1i import java.util.Properties' "$APP_GRADLE"
          if ! grep -q "quantumChessReleaseSigning" "$APP_GRADLE"; then
            cat >> "$APP_GRADLE" <<'EOF'

          // quantumChessReleaseSigning
          android {
              signingConfigs {
                  create("release") {
                      val keystorePropertiesFile = rootProject.file("keystore.properties")
                      val keystoreProperties = Properties()
                      if (keystorePropertiesFile.exists()) {
                          keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                      }
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["password"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["password"] as String
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF
          fi

      - name: Build Android app
        run: npm run tauri:android:build

      - name: Collect signed Android artifacts
        run: |
          mkdir -p release/android
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" ! -name "*unsigned*.apk" -exec cp {} release/android/ \;
          find src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" -exec cp {} release/android/ \;
          if [ "$(find release/android -name "*.apk" | wc -l)" -eq 0 ]; then
            UNSIGNED_APK_SOURCE="$(find src-tauri/gen/android/app/build/outputs/apk -name "*unsigned*.apk" | head -n 1)"
            test -n "$UNSIGNED_APK_SOURCE"
            "$ANDROID_HOME/build-tools/36.0.0/zipalign" -p -f 4 "$UNSIGNED_APK_SOURCE" release/android/Quantum-Chess-android-aligned.apk
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" sign \
              --ks "$ANDROID_KEYSTORE_PATH" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out release/android/Quantum-Chess-android.apk \
              release/android/Quantum-Chess-android-aligned.apk
            rm release/android/Quantum-Chess-android-aligned.apk
          fi
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$(find release/android -name "*.apk" | head -n 1)"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Chess-android
          path: release/android/*

      - name: Remove Android signing key
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/Quantum-Chess-release.jks" /tmp/Quantum-Chess-orig.keystore
